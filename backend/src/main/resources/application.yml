spring:
  application:
    name: backend
  config:
    import: optional:file:./.env[.properties],optional:file:./backend/.env[.properties],optional:file:../.env[.properties],optional:file:../backend/.env[.properties]
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  error:
    include-message: always
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  level:
    org.hibernate.SQL: debug

jwt:
  secret-key: ${JWT_SECRET_KEY:KJLg+mfndIn/zvuKgcfOsO1cvWVQNGBzR6SgHlyzD3pxKVkc9HmxeF+XakpJaVNunq1T+pYovINVMQYgNqyd6g==}
  access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:1800}
  refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}

ai:
  server:
    url: ${AI_SERVER_URL:http://localhost:8000}

integration:
  ai:
    provider: ${AI_PROVIDER:python}
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:}
    model: ${AI_MODEL:}
  payment:
    kakao:
      enabled: ${KAKAO_PAY_ENABLED:true}
      admin-key: ${KAKAO_ADMIN_KEY:}
      cid: ${KAKAO_PAY_CID:TC0ONETIME}
      base-url: ${KAKAO_PAY_BASE_URL:https://kapi.kakao.com}
      client-base-url: ${KAKAO_PAY_CLIENT_BASE_URL:http://localhost:5173}
      connect-timeout-millis: ${KAKAO_PAY_CONNECT_TIMEOUT_MILLIS:5000}
      read-timeout-millis: ${KAKAO_PAY_READ_TIMEOUT_MILLIS:10000}
  speech:
    provider: ${SPEECH_PROVIDER:${AI_PROVIDER:python}}
    api-key: ${SPEECH_API_KEY:}
    base-url: ${SPEECH_BASE_URL:}
    voice: ${SPEECH_VOICE:}

app:
  profile-document:
    upload-dir: ${PROFILE_DOCUMENT_UPLOAD_DIR:uploads/profile-documents}
